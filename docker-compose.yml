name: starvell-repricer

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-repricer}
      POSTGRES_USER: ${POSTGRES_USER:-repricer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-repricer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        redis-server --requirepass "$$REDIS_PASSWORD";
      else
        redis-server;
      fi'
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG; else redis-cli ping | grep PONG; fi",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build: .
    env_file: .env
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build: .
    env_file: .env
    command: python -m scripts.seed_positions
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    env_file: .env
    command: python -m app.worker_main
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker-fast-1:
    build: .
    env_file: .env
    profiles:
      - split-workers
    environment:
      APP_MODE: worker
      WORKER_GROUP: fast_1
    command: python -m app.worker_main
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker-fast-2:
    build: .
    env_file: .env
    profiles:
      - split-workers
    environment:
      APP_MODE: worker
      WORKER_GROUP: fast_2
    command: python -m app.worker_main
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker-slow:
    build: .
    env_file: .env
    profiles:
      - split-workers
    environment:
      APP_MODE: worker
      WORKER_GROUP: slow
    command: python -m app.worker_main
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    environment:
      APP_MODE: bot
    command: python -m app.bot_main
    depends_on:
      seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,time,urllib.request; p='/tmp/starvell_bot_polling_heartbeat'; assert os.path.exists(p) and time.time()-os.path.getmtime(p)<90; urllib.request.urlopen('https://api.telegram.org', timeout=10).close()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
